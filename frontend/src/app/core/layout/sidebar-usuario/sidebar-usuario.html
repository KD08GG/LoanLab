<aside class="sidebar">
  <div class="sidebar__header">
    <div class="sidebar__logo">
      <div class="sidebar__logo-icon">
        <img src="imagenes/logo.png" alt="Digital Makerspace"
             style="width:100%; height:100%; object-fit:contain;">
      </div>
      <div>
        <div class="sidebar__logo-text">Digital Makerspace</div>
        <div class="sidebar__logo-sub">UDLAP</div>
      </div>
    </div>
  </div>

  <div class="sidebar__avatar-block">
    <div class="avatar-circle">
      {{ iniciales }}
    </div>
    <div>
      <div class="sidebar__user-name">
        {{ usuario?.nombre_usuario || 'Usuario' }}
      </div>
      <div class="sidebar__user-id">
        ID: {{ usuario?.id_usuario || '----' }}
      </div>
    </div>
  </div>

  <nav class="sidebar__nav">
    <a routerLink="/usuario/home" routerLinkActive="active" class="nav-item">
      <div class="nav-item__icon"><lucide-icon [img]="Home" size="18"></lucide-icon></div>
      <span class="nav-item__label">Inicio</span>
    </a>
    <a routerLink="/usuario/solicitudes" routerLinkActive="active" class="nav-item">
      <div class="nav-item__icon"><lucide-icon [img]="ClipboardList" size="18"></lucide-icon></div>
      <span class="nav-item__label">Solicitudes</span>
    </a>
    <a routerLink="/usuario/eventos" routerLinkActive="active" class="nav-item">
      <div class="nav-item__icon"><lucide-icon [img]="CalendarDays" size="18"></lucide-icon></div>
      <span class="nav-item__label">Eventos</span>
    </a>
    <a routerLink="/usuario/analiticos" routerLinkActive="active" class="nav-item">
      <div class="nav-item__icon"><lucide-icon [img]="BarChart3" size="18"></lucide-icon></div>
      <span class="nav-item__label">Analíticos</span>
    </a>
    <a routerLink="/usuario/dispositivos" routerLinkActive="active" class="nav-item">
      <div class="nav-item__icon"><lucide-icon [img]="Monitor" size="18"></lucide-icon></div>
      <span class="nav-item__label">Mis dispositivos</span>
    </a>
  </nav>

  <div class="sidebar__footer">
    <a routerLink="/usuario/ajustes" routerLinkActive="active" class="nav-item">
      <div class="nav-item__icon"><lucide-icon [img]="Settings" size="18"></lucide-icon></div>
      <span class="nav-item__label">Ajustes</span>
    </a>
    <a routerLink="/usuario/ayuda" routerLinkActive="active" class="nav-item">
      <div class="nav-item__icon"><lucide-icon [img]="HelpCircle" size="18"></lucide-icon></div>
      <span class="nav-item__label">Ayuda</span>
    </a>
    <a routerLink="/login" class="nav-item">
      <div class="nav-item__icon"><lucide-icon [img]="LogOut" size="18"></lucide-icon></div>
      <span class="nav-item__label">Salir</span>
    </a>
  </div>
</aside>
