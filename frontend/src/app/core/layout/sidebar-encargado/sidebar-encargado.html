<aside class="sidebar">
  <div class="sidebar__header">
    <div class="sidebar__logo">
      <div class="sidebar__logo-icon">
        <img src="imagenes/logo.png" alt="Digital Makerspace"
             style="width:100%; height:100%; object-fit:contain;">
      </div>
      <div>
        <div class="sidebar__logo-text">Digital Makerspace</div>
        <div class="sidebar__logo-sub">UDLAP</div>
      </div>
    </div>
  </div>
  <nav class="sidebar__nav">
    <a routerLink="/encargado/home" routerLinkActive="active" class="nav-item">
      <div class="nav-item__icon"><lucide-icon [img]="Home" size="18"></lucide-icon></div>
      <span class="nav-item__label">Home</span>
    </a>
    <a routerLink="/encargado/solicitudes" routerLinkActive="active" class="nav-item">
      <div class="nav-item__icon"><lucide-icon [img]="ClipboardList" size="18"></lucide-icon></div>
      <span class="nav-item__label">Solicitudes</span>
    </a>
    <a routerLink="/encargado/movimientos" routerLinkActive="active" class="nav-item">
      <div class="nav-item__icon"><lucide-icon [img]="Repeat" size="18"></lucide-icon></div>
      <span class="nav-item__label">Movimientos</span>
    </a>
    <a routerLink="/encargado/inventario" routerLinkActive="active" class="nav-item">
      <div class="nav-item__icon"><lucide-icon [img]="Box" size="18"></lucide-icon></div>
      <span class="nav-item__label">Inventario</span>
    </a>
    <a routerLink="/encargado/usuarios" routerLinkActive="active" class="nav-item">
      <div class="nav-item__icon"><lucide-icon [img]="Users" size="18"></lucide-icon></div>
      <span class="nav-item__label">Usuarios</span>
    </a>
    <a routerLink="/encargado/eventos" routerLinkActive="active" class="nav-item">
      <div class="nav-item__icon"><lucide-icon [img]="Calendar" size="18"></lucide-icon></div>
      <span class="nav-item__label">Eventos</span>
    </a>
    <a routerLink="/encargado/analiticos" routerLinkActive="active" class="nav-item">
      <div class="nav-item__icon"><lucide-icon [img]="BarChart3" size="18"></lucide-icon></div>
      <span class="nav-item__label">Analíticos</span>
    </a>
  </nav>
  <div class="sidebar__footer">
    <a routerLink="/encargado/ajustes" routerLinkActive="active" class="nav-item">
      <div class="nav-item__icon"><lucide-icon [img]="Settings" size="18"></lucide-icon></div>
      <span class="nav-item__label">Ajustes</span>
    </a>
    <a routerLink="/encargado/ayuda" routerLinkActive="active" class="nav-item">
      <div class="nav-item__icon"><lucide-icon [img]="HelpCircle" size="18"></lucide-icon></div>
      <span class="nav-item__label">Ayuda</span>
    </a>
    <a href="#" class="nav-item">
      <div class="nav-item__icon"><lucide-icon [img]="LogOut" size="18"></lucide-icon></div>
      <span class="nav-item__label">Salir</span>
    </a>
  </div>
</aside>
